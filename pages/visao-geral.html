<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Visão Geral</title>

  <link rel="stylesheet" href="../src/assets/style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

  <nav class="sidebar">
    <a href="../index.html">← Voltar</a>
  </nav>
  <div class="topbar">
      <h1 id="pageTitle">Visão Geral</h1>

      <div style="display: flex; gap: 8px;">
        <!-- BOTÃO INVENTÁRIO -->
        <button class="upload-btn" onclick="document.getElementById('fileInputInventario').click()">
          Inventário
        </button>

        <button class="upload-btn" onclick="document.getElementById('fileInputMatriz').click()">
          Matriz de Risco
        </button>
      </div>

      <!-- INPUTS SEMPRE ESCONDIDOS -->
      <input type="file" id="fileInputInventario" accept=".xlsx,.xlsm,.csv" onchange="handleFileUpload(event)"
        style="display:none;">

      <input type="file" id="fileInputMatriz" accept=".xlsx,.xlsm,.csv" onchange="handleFileUploadMatriz(event)"
        style="display:none;">

      <!-- EXPORT -->
      <button class="export-btn" onclick="exportCSV()">
        Exportar CSV
      </button>
    </div>

  <div class="content">

    <!-- =================== VISÃO GERAL =================== -->
    <div class="tab-panel active" id="tab-visao-geral">
      <div class="kpi-grid" id="kpiGrid"></div>


      <!-- Filtros -->
      <div class="filter-bar">
        <div class="filter-group">
          <div class="filter-label">Empresa</div>
          <select id="f-empresa" onchange="applyFilters()">
            <option value="">Todas</option>
          </select>
        </div>
        <div class="filter-group">
          <div class="filter-label">Área</div>
          <select id="f-area" onchange="applyFilters()">
            <option value="">Todas</option>
          </select>
        </div>
        <div class="filter-group">
          <div class="filter-label">Processo</div>
          <select id="f-processo" onchange="applyFilters()">
            <option value="">Todos</option>
          </select>
        </div>
        <div class="filter-group">
          <div class="filter-label">Dados Sensíveis</div>
          <select id="f-sensivel" onchange="applyFilters()">
            <option value="">Todos</option>
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
          </select>
        </div>
        <div class="filter-group">
          <div class="filter-label">Dados de Menores</div>
          <select id="f-menor" onchange="applyFilters()">
            <option value="">Todos</option>
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
          </select>
        </div>
        <button class="filter-reset" onclick="resetFilters()">↺ Limpar</button>
      </div>

      <div id="chartFilterIndicatorVisao"
        style="display:none; padding: 12px 16px; margin: 12px 0; background: rgba(79, 142, 247, 0.15); border-left: 4px solid #4f8ef7; border-radius: 4px; color: #4f8ef7; font-size: 14px; font-weight: 500;">
      </div>

      <!-- =================== GRÁFICOS VISÃO GERAL =================== -->
      <!-- Linha 1: Indicadores de dados sensíveis e de menores (doughnut charts) -->
      <div class="charts-grid">

        <div class="chart-card chart-wide">
          <div class="chart-title">
            <span class="dot"></span>
            Ranking de Áreas por Exposição LGPD
          </div>
          <canvas id="chartAreaRisk"></canvas>
        </div>


        <div class="chart-card">
          <div class="chart-title">
            <span class="dot"></span>
            Índice de Maturidade LGPD
          </div>
          <canvas id="chartMaturity"></canvas>
        </div>


        <div class="chart-card">
          <div class="chart-title">
            <span class="dot"></span>
            Nível de Risco
          </div>
          <canvas id="chartRiskLevelResumo"></canvas>
        </div>


        <div class="chart-card chart-wide">
          <div class="chart-title">
            <span class="dot"></span>
            Base Legal x Subprocessos
          </div>
          <canvas id="chartBaseLegalSub"></canvas>
        </div>


        <div class="chart-card chart-wide">
          <div class="chart-title">
            <span class="dot"></span>
            Riscos por Área
          </div>
          <canvas id="chartRelatedRiskArea"></canvas>
        </div>


        <div class="chart-card chart-wide">
          <div class="chart-title">
            <span class="dot"></span>
            Sistemas Críticos
          </div>
          <canvas id="chartCriticalSystems"></canvas>
        </div>

      </div>
    </div>

  </div>

<script type="module" src="../src/pages/bootstrap.js"></script>
<!-- bibliotecas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- app -->
<script type="module" src="../src/pages/app.js"></script></body>

</html>
